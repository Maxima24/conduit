packages:
  - "apps/*"
  - "packages/*"

# Shared version pins — reference from any package.json as e.g. "zod": "catalog:"
# so framework/tooling majors are bumped in exactly one place.
catalog:
  typescript: ^5.7.0
  "@types/node": ^24.0.0
  zod: ^4.0.0
  tsx: ^4.19.0
  prettier: ^3.4.0
  eslint: ^9.18.0
  vitest: ^2.1.0
